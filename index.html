<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A.S. SOUZA — Logística Ambiental</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F26B1A;
    --orange-deep: #D9590E;
    --orange-soft: #FFE7D4;
    --ink: #0B1A2E;      /* deep navy */
    --ink-2: #11233E;
    --ink-3: #1B3358;
    --paper: #F6F3EE;    /* warm off-white */
    --paper-2: #EEE8DC;
    --line: #0B1A2E14;
    --text: #0B1A2E;
    --muted: #4A5A72;
    --white: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--paper); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  body { overflow-x: hidden; }
  h1,h2,h3,h4 { font-family: 'Archivo', sans-serif; letter-spacing: -0.02em; margin:0; color: var(--ink); }
  p { margin:0; }
  button { font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  ::selection { background: var(--orange); color: white; }

  /* diagonal stripe motif — echoes logo bars */
  .stripe-bg {
    background-image: repeating-linear-gradient(135deg, transparent 0 14px, rgba(242,107,26,0.08) 14px 16px);
  }
  .stripe-orange {
    background-image: repeating-linear-gradient(135deg, var(--orange) 0 14px, var(--orange-deep) 14px 16px);
  }

  /* tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--ink); color: var(--paper);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 16px 18px; width: 280px;
    z-index: 100; font-family: 'Inter', sans-serif; font-size: 13px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: none;
  }
  .tweaks-panel.on { display: block; }
  .tweaks-panel h4 { color: var(--paper); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; }
  .tweaks-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.08); }
  .tweaks-row label { color: rgba(255,255,255,0.7); }
  .tweaks-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--paper); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .tweaks-btn.active { background: var(--orange); border-color: var(--orange); }

  /* RESPONSIVE UTILITIES */
  @media (max-width: 768px) {
    /* Grids */
    .resp-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .resp-grid-2 { grid-template-columns: 1fr 1fr !important; gap: 24px 16px !important; }
    
    /* Layout & Padding */
    .resp-section { padding: 60px 20px !important; }
    .resp-inner { padding-left: 20px !important; padding-right: 20px !important; }
    .resp-header { grid-template-columns: 1fr !important; gap: 20px !important; align-items: start !important; }
    
    /* Flex */
    .resp-flex-col { flex-direction: column !important; align-items: stretch !important; gap: 16px !important; }
    .resp-flex-wrap { flex-wrap: wrap !important; }
    
    /* Typography */
    .resp-h2 { font-size: 32px !important; line-height: 1.1 !important; }
    .resp-text-center { text-align: center !important; }
    
    /* Elements */
    .resp-hide { display: none !important; }
    .resp-nav { padding: 16px 20px !important; flex-wrap: wrap !important; }
    .resp-nav-links { display: none !important; } /* Simplest mobile nav fix */
    .resp-w100 { width: 100% !important; max-width: 100% !important; }
    .resp-static { position: static !important; transform: none !important; margin-top: 20px !important; }
    .resp-tabs { flex-direction: column !important; align-items: stretch !important; gap: 8px !important; }
    .resp-tabs button { width: 100%; text-align: left; }
    .resp-card { padding: 32px 20px !important; border-radius: 20px !important; }
  }

  /* Hero background — switches per breakpoint without JS */
  .hero-bg-layer {
    background-image: url(assets/fundo-topo-assouza.webp);
  }
  @media (max-width: 767px) {
    .hero-bg-layer {
      background-image: url(assets/fundo-topo-assouza-mob.webp);
      background-size: cover !important;
      background-position: center top !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
// Tweakable defaults — persisted by host when user toggles Tweaks
window.__TWEAKS = /*EDITMODE-BEGIN*/{

  "showStats": true

</script>
